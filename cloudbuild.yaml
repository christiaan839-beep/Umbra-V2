steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/umbra-v3:$COMMIT_SHA', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/umbra-v3:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'umbra-v3'
      - '--image'
      - 'gcr.io/$PROJECT_ID/umbra-v3:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--max-instances'
      - '10'
      - '--memory'
      - '1Gi'
      - '--timeout'
      - '3600' # 60 minute timeout for intense AI Swarms
      - '--service-account'
      - 'umbra-ai-worker@$PROJECT_ID.iam.gserviceaccount.com'
images:
  - 'gcr.io/$PROJECT_ID/umbra-v3:$COMMIT_SHA'
