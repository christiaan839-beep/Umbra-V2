steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/umbra-sovereign-v3', '.']
    
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/umbra-sovereign-v3']
    
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'umbra-sovereign-v3'
      - '--image'
      - 'gcr.io/$PROJECT_ID/umbra-sovereign-v3'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      # Infinite execution limits for Agentic scraping
      - '--timeout'
      - '3600s'
      - '--cpu'
      - '2'
      - '--memory'
      - '4Gi'

images:
  - 'gcr.io/$PROJECT_ID/umbra-sovereign-v3'
