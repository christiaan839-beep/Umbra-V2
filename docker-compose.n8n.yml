version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: umbra-n8n-orchestrator
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/New_York
      # Pass through all API keys from .env.local
    env_file:
      - .env.local
    volumes:
      - n8n_data:/home/node/.n8n
      # Mount the skills directory so the import script can access the .json templates
      - /Users/christiaanwillemdewet/.gemini/antigravity/skills:/skills:ro

volumes:
  n8n_data:
